apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-booking-app
spec:
  replicas: 2  # This runs 2 copies of your app for reliability
  selector:
    matchLabels:
      app: hotel-booking
  template:
    metadata:
      labels:
        app: hotel-booking
    spec:
      containers:
      - name: hotel-app-container
        # Replace 'your-docker-username' with your actual Docker Hub username
        image: your-docker-username/hotel-booking:latest 
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hotel-booking-service
spec:
  type: LoadBalancer # This creates a public IP address to access your app
  selector:
    app: hotel-booking
  ports:
    - protocol: TCP
      port: 80        # Port people will visit
      targetPort: 8080 # Port the app is running on inside the container